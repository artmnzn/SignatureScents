    /* --- BASE Y TIPOGRAFÍA --- */
/* --- CONFIGURACIÓN GLOBAL --- */
html, body {
  max-width: 100%;
  overflow-x: hidden; /* Elimina el espacio fantasma a la derecha */
  position: relative;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  background-color: #0a0a0a;
  color: #fff;
  text-align: center;
}

/* --- AJUSTE DEL CONTENEDOR --- */
.container {
  width: 100%;
  display: grid; /* Asegúrate de mantener el grid para las cards */
  grid-template-columns: repeat(auto-fill, minmax(250px, 280px));
  gap: 20px;
  justify-content: center;
  box-sizing: border-box; /* El padding no afecta el ancho total */
  padding: 20px;
  margin-top: 20px;
}

    header a {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      letter-spacing: 2px;
      color: #c9a96e;
      text-decoration: none;
      transition: 0.3s;
    }

    header a:hover {
      color: #fff;
      letter-spacing: 3px;
    }

    .watermark {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('Decants_website/logopng.png');
      background-repeat: no-repeat;
      background-position: center 60%;
      background-size: 400px;
      opacity: 0.02; 
      filter: blur(2px);
      pointer-events: none;
      z-index: 0;
    }

    /* --- NAVEGACIÓN (TOP BAR) --- */
    .top-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 1000;
      background: #0a0a0a;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    .brand-header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px;
    }

    .logo { width: 50px; transition: 0.3s; }
    .brand-name { font-family: 'Playfair Display', serif; font-size: 32px; color: #c9a96e; transition: 0.3s; }
    .brand-link { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-link:hover .brand-name { color: #fff; letter-spacing: 3px; }

    #cart-indicator {
      cursor: pointer;
      display: inline-flex;   
      align-items: center;
      gap: 18px;
      margin-bottom: 20px;
    }

    #cart-text { font-size: 20px; transition: opacity 0.2s ease; }
    #cart-text:hover {
      color: #c9a96e;
      cursor: pointer;
     }

    #cart-count {
      position: absolute;
      top: -8px; /* Ajusta esto para que flote sobre el icono */
     right: -12px;
     background: #c9a96e;
     color: #000;
     font-size: 12px;
     font-weight: bold;
    min-width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1001; /* Asegura que esté por encima de la barra */
    }

    /* --- SELECTOR DE CATEGORÍAS --- */
.category-selector {
  display: flex;
  gap: 20px;
  justify-content: center;
  padding: 20px;
  margin-top: 240px; 
}

.category-card {
  position: relative;
  width: 100%;
  max-width: 400px;
  height: 200px;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  border: 1px solid #222;
  /* Quitamos el espacio en el selector de abajo */
  transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.category-card img {
  width: 100%; 
  height: 100%;
  object-fit: cover;
  opacity: 0.6;
  transition: 0.6s ease;
}

.cate

/* CORRECCIÓN: Sin espacio antes de :hover */
.category-card:hover {
  border-color: #c9a96e; /* Cambié a dorado para que combine con tu marca */
  transform: translateY(-5px); /* Un pequeño salto le da mucha calidad */
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}

/* Efecto en la imagen cuando la card tiene hover */
.category-card:hover img {
  opacity: 0.9;
  transform: scale(1.05);
  filter: brightness(1.1);
}

.category-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
  transition: background 0.6s;
}

.category-overlay span {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  letter-spacing: 3px;
  color: #c9a96e;
  transition: all 0.4s ease;
}

/* El texto también puede brillar un poco */
.category-card:hover .category-overlay span {
  color: #fff;
  letter-spacing: 4px;
}
    /* --- CONTENEDOR DE PRODUCTOS --- */
   .container {
   margin-top: 40px; /* Reducimos el margen para que no se corte */
   display: grid;
   grid-template-columns: repeat(auto-fill, minmax(250px, 280px));
   gap: 20px;
   justify-content: center;
   padding: 20px; /* Añadimos padding para que los productos respiren */
   scroll-margin-top: 250px; /* Esto ayuda a que el scroll automático no lo pegue al techo */
  }

    .card {
      display: none;
      background: #111;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
      width: 100%;
      border: 1px solid #1a1a1a;
      z-index: 1;
    }
   
    .card:hover {
  /* 1. Empuje hacia el frente (Scale 1.05 = 5% más grande) */
  transform: scale(1.05) translateY(-5px); 
  
  /* 2. Brillo dorado sutil y sombra más profunda */
  box-shadow: 0 20px 40px rgba(201, 169, 110, 0.25); 
  
  /* 3. Borde dorado sutil que se enciende */
  border-color: #c9a96e; 
  
  /* 4. Subimos el z-index para que esté por encima de sus vecinas al crecer */
  z-index: 10; 
}

    .card.hidden { display: none; opacity: 0; }

    .img-container {
  width: 100%; 
  aspect-ratio: 3 / 4; /* Mantenemos tu proporción */
  background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
  position: relative;  /* 👈 NECESARIO para que las notas se alineen aquí dentro */
  overflow: hidden;    /* 👈 NECESARIO para que nada sobresalga de las esquinas */
}

    .card:hover .img-container img {
  transform: scale(1.03); 
}

    .img-container img { width: 100%; height: 100%; object-fit: cover;transition: transform 0.6s ease; }
    .card-content { padding: 15px; }
    .card-title { font-size: 18px; margin-bottom: 5px; }
    .card-name { font-size: 15px; margin-bottom: 5px; color: #fff; }
    .ml { font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .price { color: #c9a96e; font-weight: bold; margin-bottom: 15px; }

.btn {
  display: block;
  padding: 12px;
  background: #e5c98b !important; 
  color: #000;
  text-decoration: none; 
  border-radius: 8px;
  font-weight: bold; 
  transition: all 0.3s ease;
  border: 1px solid transparent;
  outline: none; /* 👈 Solo agregas esta línea */
}

   .btn:hover {
      background: #000;      /* Invierte colores */
      color: #c9a96e;
      border: 1px solid #c9a96e;
     transform: translateY(-3px); /* Pequeño salto hacia arriba */
     box-shadow: 0 5px 15px rgba(201, 169, 110, 0.3); /* Brillo dorado sutil */
     transform: scale(1.05);
   }
  
   .btn:focus {
    background: #c9a96e !important; 
    color: #000 !important;
    transform: scale(1) !important;
    outline: none;
   }
  
   .btn:active {
   transform: scale(0.92) !important; /* Se hunde un poco */
   background: #b3955d !important;    /* Se oscurece un pelín */
   transition: 0.1s; /* Respuesta instantánea al tacto */
  }

  .info-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  
  /* Usamos un color sólido o casi sólido para que NO se transparente la botella */
  background: rgba(10, 10, 10, 0.95); 
  
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  
  opacity: 0; /* Escondido al principio */
  transition: opacity 0.3s ease;
  z-index: 2; /* Por encima de la imagen del perfume */
  padding: 20px;
  box-sizing: border-box;
}

/* Cuando pasamos el mouse por la card, el telón aparece */
.card:hover .info-overlay {
  opacity: 1;
}

/* Estilo para las notas olfativas */
.notes-content {
  text-align: center;
}

.notes-content h4 {
  color: #fff;
  font-family: 'Playfair Display', serif;
  margin-bottom: 10px;
  border-bottom: 1px solid #c9a96e;
  padding-bottom: 5px;
}

.notes-content p {
  font-size: 13px;
  color: #c9a96e; /* Dorado */
  margin: 5px 0;
  line-height: 1.4;
}

    /* --- CARRITO (PANEL LATERAL) --- */
    #cart-panel {
      position: fixed;
      top: 0; right: -350px;
      width: 320px; height: 100vh;
      background: #111;
      box-shadow: -10px 0 30px rgba(0,0,0,0.9);
      transition: 0.4s ease;
      display: flex;
      flex-direction: column;
      z-index: 99999;
    }

    #cart-panel.active { right: 0; }

    .cart-header {
      padding: 20px 20px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #close-cart {
      background: #222; border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 6px;
      cursor: pointer;
     transition: 0.3s; /* DE VUELTA LA ANIMACIÓN */
     display: flex; align-items: center; justify-content: center;
    }
   
    #close-cart:hover {
   background: #c9a96e;
  color: #000;
  transform: rotate(90deg);
   }
   
    .category-selector {
     margin-bottom: 100px; 
     }

    #cart-items { flex: 1; overflow-y: auto;padding: 0px 10px 0px 10px; list-style: none; text-align: left;margin:0; }
    .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
    .cart-item span { font-size: 13px; color: #efefef; }

    .cart-icon {
      position: relative; /* 👈 Vital para que el número se pegue al icono */
      display: flex;
      align-items: center;
      justify-content: center;
     }

    .qty-btn { 
     background: #1a1a1a;
     border: 1px solid #333; 
     color: #c9a96e; 
     border-radius: 4px; 
     width: 24px; 
     height: 24px;
     cursor: pointer; 
     transition: all 0.3s ease;
    }

    .qty-btn:hover {
   background: #c9a96e;
   color: #000;
   border-color: #c9a96e;
   transform: scale(1.1);
   }
    .remove-btn { background: transparent; border: none; color: #ff4d4d; cursor: pointer; margin-left: 10px; }

    .cart-actions { padding: 20px; background: #181818; display: flex; flex-direction: column; gap: 10px; }
    .cart-actions button { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    #clear-cart { background: #222; color: #fff; }
    

    #checkout {
    background: #c9a96e;
    color: #000;
    transition: 0.3s ease;
   }

   #checkout:hover {
   background: #e5c98b;
   letter-spacing: 1px; /* Efecto elegante de expansión de texto */
   transform: scale(1.02);
   }

   #clear-cart {
   background: #c9a96e;
   color: black;
   transition: 0.3s ease;
  }

  #clear-cart:hover {
   color: black;
   letter-spacing: 1px;
   transform: scale(1.02);
  }

.search-container {
  position: relative;
  max-width: 600px;
  margin: 30px auto;
  padding: 0 20px;
}

#perfume-search {
  width: 100%;
  padding: 15px 20px 15px 45px;
  background: #111;
  border: 1px solid #333;
  border-radius: 30px;
  color: #fff;
  font-size: 16px;
  outline: none;
  transition: all 0.3s ease;
}

#perfume-search:focus {
  border-color: #c9a96e;
  box-shadow: 0 0 15px rgba(201, 169, 110, 0.2);
  background: #181818;
}

.search-icon {
  position: absolute;
  left: 35px;
  top: 50%;
  transform: translateY(-50%);
  color: #c9a96e;
  pointer-events: none;
}

    /* --- RESPONSIVO --- */
  
/* --- 7. RESPONSIVO --- */

/* Tablets y pantallas medianas */
@media (max-width: 768px) {
  .category-selector { 
    flex-direction: column; 
    align-items: center; 
    margin-top: 280px; 
  }
  .container { 
    grid-template-columns: repeat(2, 1fr); 
  }
}

/* Celulares (iPhone/Android) */
@media (max-width: 480px) {
  #cart-panel {
    width: 100% !important; /* Cubre todo el ancho */
    right: -100%;           /* Se esconde fuera */
    height: 100vh;          /* Cubre todo el alto */
    top: 0;
  }

  #cart-panel.active {
    right: 0;
  }
 
 .card-name { font-size: 12px;}
 .card-title { font-size: 16px;}

  .cart-header {
    /* Padding ajustado para que la "X" de cerrar sea fácil de tocar */
    padding: 80px 20px 20px;  
  }

  .cart-actions {
    padding: 20px;
    /* Esto es oro puro para iPhones con barra abajo */
    padding-bottom: env(safe-area-inset-bottom, 20px); 
  }

  .cart-actions button {
    height: 55px; /* Un poquito más alto para dedos grandes */
    font-size: 16px;
  }
  
  #perfume-search {width:auto;}
  
  .category-card:active .category-overlay span {
    color: #fff !important;
    letter-spacing: 5px !important;
    transition: 0.2s;
  }

  /* También podemos hacer que la imagen brille al tocarla */
  .category-card:active img {
    opacity: 0.9 !important;
    transform: scale(1.05) !important;
  }
  
  /* Esto asegura que el botón regrese al dorado original después del toque */
.btn:focus {
    background: #c9a96e !important;
    color: #000 !important;
    transform: scale(1) !important;
    box-shadow: none !important;
    outline: none !important;
}

/* Solo permitimos que se vea "presionado" mientras el dedo está sobre la pantalla */
.btn:active {
    background: #b3955d !important;
    transform: scale(0.95) !important;
}

}

// --- 1. LÓGICA DE BÚSQUEDA Y FILTRADO ---

function buscarPerfume() {
    const input = document.getElementById('perfume-search').value.toLowerCase();
    const cards = document.querySelectorAll('.card');
    const container = document.getElementById('perfume-container');

    // Si la barra está vacía, ocultamos todo para mantener la limpieza
    if (input === "") {
        cards.forEach(card => {
            card.style.display = 'none';
            card.classList.add('hidden');
        });
        return;
    }

    container.style.display = 'grid';
    cards.forEach(card => {
        const marca = card.querySelector('.card-title').innerText.toLowerCase();
        const nombre = card.querySelector('.card-name').innerText.toLowerCase();

        if (marca.includes(input) || nombre.includes(input)) {
            card.style.display = 'block';
            setTimeout(() => { card.classList.remove('hidden'); }, 10);
        } else {
            card.style.display = 'none';
            card.classList.add('hidden');
        }
    });
}

function filtrar(categoria) {
    const cards = document.querySelectorAll('.card');
    const container = document.getElementById('perfume-container');
    const searchBar = document.querySelector('.search-container');
    
    container.style.display = 'grid';

    cards.forEach(card => {
        if (card.getAttribute('data-category') === categoria) {
            card.style.display = 'block';
            setTimeout(() => { card.classList.remove('hidden'); }, 10);
        } else {
            card.style.display = 'none';
            card.classList.add('hidden');
        }
    });

    // Scroll suave hacia la zona de búsqueda/catálogo
    window.scrollTo({
        top: searchBar.offsetTop - 100,
        behavior: 'smooth'
    });
}

// --- 2. LÓGICA DEL CARRITO ---

let carrito = JSON.parse(localStorage.getItem('carrito')) || [];

function actualizarContador() {
    const total = carrito.reduce((acc, item) => acc + item.cantidad, 0);
    const counter = document.getElementById('cart-count');
    counter.innerText = total;
    // Animación de pop al actualizar
    counter.style.transform = 'scale(1.3)';
    setTimeout(() => { counter.style.transform = 'scale(1)'; }, 200);
}

function actualizarTotal() {
    const total = carrito.reduce((acc, item) => acc + item.precio * item.cantidad, 0);
    document.getElementById('cart-total').innerText = `Total: $${total.toFixed(2)}`;
}

function renderCarrito() {
    const cartItems = document.getElementById('cart-items');
    cartItems.innerHTML = '';
    
    carrito.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
            <div class="cart-item">
                <span>${item.nombre}</span>
                <div class="cart-controls">
                    <button class="qty-btn" onclick="cambiarCantidad(${index}, -1)">−</button>
                    <span class="qty">${item.cantidad}</span>
                    <button class="qty-btn" onclick="cambiarCantidad(${index}, 1)">+</button>
                    <button class="remove-btn" onclick="eliminarItem(${index})">✕</button>
                </div>
            </div>
        `;
        cartItems.appendChild(li);
    });

    localStorage.setItem('carrito', JSON.stringify(carrito));
    actualizarContador();
    actualizarTotal();
}

function cambiarCantidad(index, cambio) {
    carrito[index].cantidad += cambio;
    if (carrito[index].cantidad <= 0) carrito.splice(index, 1);
    renderCarrito();
}

function eliminarItem(index) {
    carrito.splice(index, 1);
    renderCarrito();
}

function hacerPedido() {
    if (carrito.length === 0) { alert('Tu carrito está vacío'); return; }
    
    // Usamos el guion estándar (-) que es seguro en cualquier sistema
    const lista = carrito.map(item => `- ${item.nombre} (x${item.cantidad})`).join('\n');
    const total = carrito.reduce((acc, item) => acc + item.precio * item.cantidad, 0);
    
    // Texto plano y directo. La elegancia está en la claridad.
    const saludo = "¡Hola Signature Scents!";
    const cuerpo = "Quiero realizar el siguiente pedido:";
    
    // El asterisco (*) para negritas sí es seguro en WhatsApp
    const mensaje = `${saludo}\n\n${cuerpo}\n${lista}\n\n*Total a pagar: $${total.toFixed(2)}*`;
    
    // Sin códigos extraños, solo el mensaje limpio
    const url = `https://wa.me/50375392948?text=${encodeURIComponent(mensaje)}`;
    
    window.open(url, '_blank');
}
// --- 3. GENERADOR DE PRODUCTOS (HTML DINÁMICO) ---

function renderizarProductos() {
    const container = document.getElementById('perfume-container');
    if(!container) return;
    container.innerHTML = ""; 

    productos.forEach(p => {
        const card = document.createElement('div');
        card.className = `card hidden`; // Empiezan ocultas para el efecto de búsqueda/filtro
        card.style.display = "none";    // Se muestran solo al filtrar o buscar
        card.setAttribute('data-category', p.categoria);

        card.innerHTML = `
            <div class="img-container">
                <img src="${p.imagen}" class="main-img">
                <div class="info-overlay">
                    <div class="notes-content">
                        <h4>Notas Olfativas</h4>
                        <p><strong>Salida:</strong> ${p.notas.salida}</p>
                        <p><strong>Corazón:</strong> ${p.notas.corazon}</p>
                        <p><strong>Fondo:</strong> ${p.notas.fondo}</p>
                    </div>
                </div>
            </div>
            <div class="card-content">
                <div class="card-title">${p.marca}</div>
                <div class="card-name">${p.nombre}</div>
                <div class="ml">${p.ml}</div>
                <div class="price">$${p.precio.toFixed(2)}</div>
                <a class="btn add-cart" href="#">Agregar</a>
            </div>
        `;
        container.appendChild(card);
    });
}

// --- 4. ENCENDIDO DEL MOTOR (DOMContent Loaded) ---

document.addEventListener('DOMContentLoaded', () => {
    // 1. Dibujar todos los perfumes en el HTML
    renderizarProductos();
    
    // 2. Cargar estado previo del carrito
    renderCarrito();

    // 3. Listener para el panel del carrito
    const cartIndicator = document.getElementById('cart-indicator');
    const cartPanel = document.getElementById('cart-panel');
    const closeCart = document.getElementById('close-cart');
    const checkoutBtn = document.getElementById('checkout');
    const clearCart = document.getElementById('clear-cart');

    cartIndicator.addEventListener('click', () => {
        cartPanel.classList.toggle('active');
        document.body.style.overflow = cartPanel.classList.contains('active') ? 'hidden' : 'auto';
    });

    closeCart.addEventListener('click', () => {
        cartPanel.classList.remove('active');
        document.body.style.overflow = 'auto';
    });

    checkoutBtn.addEventListener('click', hacerPedido);
    clearCart.addEventListener('click', () => { carrito = []; renderCarrito(); });

    // 4. Delegación de eventos para botones "Agregar" (Porque las cards son dinámicas)
    document.addEventListener('click', (e) => {
        if (e.target.classList.contains('add-cart')) {
            e.preventDefault();
            const btn = e.target;
            const card = btn.closest('.card');
            const nombre = card.querySelector('.card-name').innerText;
            const ml = card.querySelector('.ml')?.innerText || '';
            const precio = parseFloat(card.querySelector('.price').innerText.replace('$', ''));

            const productoFull = `${nombre} ${ml}`;
            const existente = carrito.find(item => item.nombre === productoFull);

            if (existente) existente.cantidad++;
            else carrito.push({ nombre: productoFull, cantidad: 1, precio: precio });

            renderCarrito();
            
            // Feedback visual rápido
            btn.innerText = "¡Añadido!";
            setTimeout(() => { btn.innerText = "Agregar"; }, 800);
        }
    });

    // 5. Efecto Hover en el texto del carrito
    const cartText = document.getElementById('cart-text');
    cartText.addEventListener('mouseenter', () => {
        cartText.style.opacity = '0';
        setTimeout(() => { cartText.innerText = 'ver carrito'; cartText.style.opacity = '1'; }, 150);
    });
    cartText.addEventListener('mouseleave', () => {
        cartText.style.opacity = '0';
        setTimeout(() => { cartText.innerText = 'productos'; cartText.style.opacity = '1'; }, 150);
    });
});
</script>
